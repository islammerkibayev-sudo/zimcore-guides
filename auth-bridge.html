<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — Zimran</title>
<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #08080c;
        color: #eaeaef;
        font-family: system-ui, sans-serif;
    }
    .card {
        text-align: center;
        padding: 2.5rem 2rem;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        background: rgba(255,255,255,0.03);
        max-width: 360px;
    }
    h1 { font-size: 1.2rem; margin: 0 0 0.4rem; }
    p { color: #8a8a98; font-size: 0.9rem; margin: 0 0 1.4rem; }
    .btn-wrap { display: flex; justify-content: center; min-height: 44px; }
    .denied { color: #ff6b6b; font-size: 0.85rem; margin-top: 1rem; }
</style>
</head>
<body>
<div class="card">
    <h1>Вход через Google</h1>
    <p>Корпоративный @zimran.io аккаунт</p>
    <div id="googleBtnContainer" class="btn-wrap"></div>
    <div id="denied" class="denied" style="display:none">Не удалось войти — попробуй ещё раз</div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
(function () {
    var CLIENT_ID = '322511203444-olfol30eroe4lrp3c34rj6h91hh5tdmn.apps.googleusercontent.com';

    // Where we may send the user back with the credential. Strict allowlist so
    // this page can't be abused as an open redirect for token harvesting.
    var ALLOWED_RETURNS = [
        'https://zimpolyglot-web-production.up.railway.app/login',
        'http://localhost:8000/login',
    ];

    var params = new URLSearchParams(window.location.search);
    var requested = params.get('return') || ALLOWED_RETURNS[0];
    var returnUrl = ALLOWED_RETURNS.indexOf(requested) !== -1 ? requested : ALLOWED_RETURNS[0];

    window.handleBridgeSignIn = function (response) {
        window.location.href = returnUrl + '#credential=' + encodeURIComponent(response.credential);
    };

    function init() {
        if (typeof google === 'undefined' || !google.accounts) {
            setTimeout(init, 200);
            return;
        }
        google.accounts.id.initialize({
            client_id: CLIENT_ID,
            callback: handleBridgeSignIn,
            auto_select: true
        });
        google.accounts.id.renderButton(
            document.getElementById('googleBtnContainer'),
            { type: 'standard', theme: 'outline', size: 'large', text: 'signin_with', shape: 'pill', width: 280 }
        );
        google.accounts.id.prompt();
    }
    init();
})();
</script>
</body>
</html>
